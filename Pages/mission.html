<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Mission AI</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="../style.css">

</head>

<body>

    <div class="background">

        <div class="circle c1"></div>
        <div class="circle c2"></div>
        <div class="circle c3"></div>

    </div>

    <div class="container">

        <div class="logo">

            MISSION AI

        </div>

        <br>

        <div style="display:flex;justify-content:space-between;align-items:center;">

            <span id="missionNumber">

                Mission 1 / 5

            </span>

            <span id="timer">

                ⏱ 60

            </span>

        </div>

        <br>

        <div class="progress">

            <div id="progressBar"></div>

        </div>

        <br>

        <div style="margin-bottom:15px;">

            <span style="background:#dc2626;padding:8px 15px;border-radius:20px;font-weight:bold;">

                🔴 HIGH RISK

            </span>

        </div>

        <div id="questionBox">

        </div>

        <br>

        <div id="options">

        </div>

    </div>

    <script src="../js/questions.js"></script>

    <script src="../script.js"></script>

</body>

</html>
